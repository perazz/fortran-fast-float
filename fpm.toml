name = "fortran-fast-float"
version = "0.1.0"
license = "license"
author = "Federico Perini"
copyright = "Copyright 2026, Federico Perini"
[library]
source-dir = "src"
include-dir = ["include"]
[build]
auto-executables = true
auto-tests = false
auto-examples = true
module-naming = false
[install]
library = false
test = false
[fortran]
implicit-typing = false
implicit-external = false
source-form = "free"

[[test]]
name = "check"
source-dir = "test"
main = "check.f90"

[[test]]
name = "benchmark_compare"
source-dir = "test"
main = "benchmark_compare.f90"
